# model
model:
  num_classes: 10

# dataset
data:
  dataset: cifar10
  batch_size: 64
  num_workers: 2

# training
training:
  epochs: 20
  learning_rate: 0.001
  optimizer: adam
  weight_decay: 0.0001
  gradient_clip: 1.0

# checkpointing
checkpointing:
  save_every: 5
  checkpoint_dir: checkpoints/

# metrics emission (how often train.py writes metrics for the agent to read)
monitoring:
  emit_every_n_steps: 10
  metrics_file: metrics/metrics.jsonl
