checkpointing:
  checkpoint_dir: checkpoints/
  save_every: 5
data:
  batch_size: 64
  dataset: cifar10
  num_workers: 2
model:
  num_classes: 10
monitoring:
  emit_every_n_steps: 10
  metrics_file: metrics/metrics.jsonl
training:
  epochs: 20
  gradient_clip: 1.0
  learning_rate: 0.0001
  optimizer: adam
  weight_decay: 5.0e-05
